# Cloudflare Tunnel ingress for PySpire (locally-managed tunnel).
# Place at /etc/cloudflared/config.yml on the Raspberry Pi.
#
# Architecture:
#   Browser --HTTPS--> Cloudflare edge --tunnel--> cloudflared (Pi)
#           --HTTP--> 127.0.0.1:8081 (Caddy) --> static files
#
# Cloudflare's edge handles TLS, Brotli compression, and CDN edge caching, so
# the Pi only serves plain HTTP on loopback. No inbound ports are opened on the
# Pi or your router -- cloudflared makes an OUTBOUND connection to Cloudflare.

tunnel: REPLACE_WITH_TUNNEL_ID
credentials-file: /etc/cloudflared/REPLACE_WITH_TUNNEL_ID.json

ingress:
  # Public hostname you mapped to this tunnel in the Cloudflare dashboard.
  - hostname: pyspire.example.com
    service: http://127.0.0.1:8081
  # Required catch-all: anything else gets a 404.
  - service: http_status:404
